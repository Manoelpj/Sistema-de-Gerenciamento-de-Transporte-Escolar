name: Backend CI

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  django-ci:
    name: Django CI (Python 3.12)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend/escolar

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/escolar/requirements.txt

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verificar integridade do projeto Django
        run: python manage.py check

      - name: Verificar migrações pendentes
        run: python manage.py makemigrations --check --dry-run

      - name: Aplicar migrações
        run: python manage.py migrate --noinput
