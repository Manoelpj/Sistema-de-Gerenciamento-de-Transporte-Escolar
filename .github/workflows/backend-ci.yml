name: Backend CI

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  workflow_dispatch:

jobs:
  django-ci:
    name: Django CI (Python 3.12)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend/escolar

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/escolar/requirements.txt

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalar dependências do sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz graphviz-dev

      - name: Instalar dependências Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verificar integridade do projeto Django
        run: python manage.py check

      - name: Verificar se há deprecações
        run: python -W error::DeprecationWarning manage.py check

      - name: Verificar Padrão de Código com Black
        run: black --check .

      - name: Checar código duplicado com JSCPD
        run: 
          npx jscpd . --threshold 0        

      - name: Gerar diagrama UML
        run: |
          mkdir -p artifacts
          python manage.py graph_models \
            -a \
            -g \
            -o artifacts/django-models.svg

      - name: Publicar diagrama UML
        uses: actions/upload-artifact@v4
        with:
          name: django-uml
          path: backend/escolar/artifacts/django-models.svg
