name: Security Scan (OWASP)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  depcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Preparar arquivo de dependências
        run: cp backend/escolar/requirements.txt ./requirements.txt

      - name: run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'Backend Escolar'
          path: './requirements.txt'
          format: 'HTML'
          args: >
            --failOnCVSS 0